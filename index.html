<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/logo.jpg" type="image/x-icon">
    <title>EASY PRONOUNCE</title>
</head>
<body>
   <div class="navbar">
    <h2>EASY PRONOUNCE</h2>

      <button id="openLogin"><p>Sign In</p></button>

<div id="overlay"></div>

    <div id="loginBox" class="hidden">
        <h3>SIGN IN</h3><br>
        <input type="text" placeholder="email" required><br><br>
        <input type="password" placeholder="password" required><br><br>
        <div class="log"><button>Sign In</button></div>
    </div>
   </div>

   <div class="container">
    <div class="info">
        <h3>PRONOUNCE</h3>
        <br>
        <p>Type any word to hear it and learn its meaning</p><br>
        <div class="input">
             <input type="text" placeholder="search a word">
        <button>Look Up</button>
    </div>
</div>
<div class="wrapper">
<ul>
    <li class="word">
        <div class="details">
            <p>happy</p>
            <span>/hapi/</span>
            </div>
            <i class="fa-solid fa-volume-high"></i>
    </li>
    <div class="content">
         <li class="meaning">
               <div class="details">
            <p>Meaning</p>
            <span>felling or showing pleasure</span>
            </div>
         </li>

           <li class="example">
               <div class="details">
            <p>Example</p>
            <span>Am so happy for you</span>
            </div>
         </li>
    </div>
   
</ul>
  
</div>
 </div>
   <script src="function.js"></script>
</body>
</html>
